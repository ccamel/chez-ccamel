name: Check / Secrets

on:
  push:
    branches: [main]
    paths:
      - "nix-config/secrets/**/*.yaml"
      - "nix-config/.sops.yaml"
      - .github/workflows/check-secrets.yml
  pull_request:
    branches: [main]
    paths:
      - "nix-config/secrets/**/*.yaml"
      - "nix-config/.sops.yaml"
      - .github/workflows/check-secrets.yml

jobs:
  check-secrets:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify SOPS metadata
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          secrets=(nix-config/secrets/*.yaml)

          if (( ${#secrets[@]} == 0 )); then
            echo "::error::No encrypted secret file found."
            exit 1
          fi

          for secret in "${secrets[@]}"; do
            if ! tail -n 64 "$secret" | grep -qx "sops:"; then
              echo "::error file=$secret::Missing SOPS metadata footer; secret may be decrypted."
              exit 1
            fi
          done
