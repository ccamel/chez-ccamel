name: Lint / Markdown

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"

jobs:
  lint-markdown:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Lint markdown files
        uses: avto-dev/markdown-lint@v1.5.0
        with:
          args: "**/*.md"
          ignore: "CHANGELOG.md"
