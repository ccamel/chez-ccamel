name: Lint / YAML

on:
  push:
    branches: [main]
    paths:
      - "**/*.yml"
      - "**/*.yaml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.yml"
      - "**/*.yaml"

jobs:
  lint-yaml:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3.1.1
