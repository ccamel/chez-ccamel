name: Lint / Nix

on:
  push:
    branches: [main]
    paths:
      - "home/**/*.nix"
      - "hosts/**/*.nix"
      - "hosts/**/flake.lock"
      - .github/workflows/lint-nix.yml
  pull_request:
    branches: [main]
    paths:
      - "home/**/*.nix"
      - "hosts/**/*.nix"
      - "hosts/**/flake.lock"
      - .github/workflows/lint-nix.yml

jobs:
  lint-nix:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Check Nix formatting
        run: |
          cd hosts/forge
          nix fmt -- --check

      - name: Lint Nix files
        run: nix run nixpkgs#statix -- check .
